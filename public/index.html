<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>DreamGallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="cabecalho">
  <div class="logo">
    <img src="logodream.png" alt="Logo DreamGallery" class="imagem-logo">
  </div>
  <nav class="menu">
    <button class="botao-menu">Photos</button>
    <button class="botao-menu">Videos</button>
  </nav>
</header>

<main class="principal">
  <section class="secao-pesquisa">
    <form class="formulario">
      <input type="text" placeholder="Pesquisar" class="campo-input">
      <button type="submit" class="botao">Buscar</button>
    </form>
  </section>

  <section class="galeria">

    <article class="cartao">
      <h3 class="titulo-foto">Mulher em barco</h3>
      <img src="https://picsum.photos/id/1011/300/300?grayscale" alt="Mulher em barco grayscale">
      <div class="informacoes">
        <span>❤️ 6 💬 9</span>
        <button class="botao">Salvar</button>
      </div>
    </article>

    <article class="cartao">
      <h3 class="titulo-foto">Dog fofo 1</h3>
      <img src="https://picsum.photos/id/1025/300/300?grayscale" alt="Dog fofo 1 grayscale">
      <div class="informacoes">
        <span>❤️ 3 💬 3</span>
        <button class="botao">Salvar</button>
      </div>
    </article>

    <article class="cartao">
      <h3 class="titulo-foto">Homem e arco-íris</h3>
      <img src="https://picsum.photos/id/1035/300/300?grayscale" alt="Homem e arco iris grayscale">
      <div class="informacoes">
        <span>❤️ 1 💬 0</span>
        <button class="botao">Salvar</button>
      </div>
    </article>

    <article class="cartao">
      <h3 class="titulo-foto">Floresta com rio top</h3>
      <img src="https://picsum.photos/id/1043/300/300?grayscale" alt="Floresta com rio top grayscale">
      <div class="informacoes">
        <span>❤️ 0 💬 0</span>
        <button class="botao">Salvar</button>
      </div>
    </article>

    <article class="cartao">
      <h3 class="titulo-foto">Mar e montanhas de mar</h3>
      <img src="https://picsum.photos/id/1050/300/300?grayscale" alt="Mar e montanhas de mar grayscale">
      <div class="informacoes">
        <span>❤️ 7 💬 2</span>
        <button class="botao">Salvar</button>
      </div>
    </article>

  </section>
</main>

<footer class="rodape">
  <p>© 2026 DreamGallery</p>
</footer>

</body>
</html>
